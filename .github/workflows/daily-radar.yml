name: Daily Hotspot Radar

on:
  schedule:
    # 每天北京时间 08:00（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      pushplus_token:
        description: 'PushPlus token（Secret 未生效时在此粘贴）'
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Run radar scan + WeChat push
        id: wechat_push
        env:
          PUSHPLUS_TOKEN: ${{ github.event.inputs.pushplus_token || secrets.PUSHPLUS_TOKEN }}
        run: |
          if [ -z "$PUSHPLUS_TOKEN" ]; then
            echo "::error::No PushPlus token found."
            echo "::error::Fix A: Run workflow again and paste token into the pushplus_token field."
            echo "::error::Fix B: Add repository secret PUSHPLUS_TOKEN at https://github.com/stone13825110136/hotpicklab/settings/secrets/actions"
            exit 1
          fi
          echo "PUSHPLUS_TOKEN configured (length ${#PUSHPLUS_TOKEN})"
          node scripts/daily-radar.mjs

      - name: Commit radar results
        if: success()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radar/
          if git diff --staged --quiet; then
            echo "No radar changes to commit"
            exit 0
          fi
          git commit -m "Daily radar $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Create confirmation Issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create radar --color E4A000 --description "Daily hotspot radar" 2>/dev/null || true
          DATE=$(date -u +%Y-%m-%d)
          EXISTING=$(gh issue list --label radar --search "Radar $DATE" --json number --jq 'length')
          if [ "$EXISTING" != "0" ]; then
            echo "Issue already exists for $DATE — skip"
            exit 0
          fi
          BODY=$(node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const p=JSON.parse(readFileSync('./radar/latest.json','utf8'));
            const list=p.candidates.map(c=>'- **'+c.id+'** ['+c.score+'] '+c.title+' ('+c.source+')').join('\n');
            console.log('## HotPick Lab Radar '+p.date+'\n\n'+list+'\n\n---\n**Confirm:** comment \`approve 1,3\` to publish those items.\n\nOr tell Cursor: \`发布雷达 '+p.date+' 第1,3条\`');
          ")
          gh issue create --title "Radar $DATE — confirm picks" --body "$BODY" --label radar
