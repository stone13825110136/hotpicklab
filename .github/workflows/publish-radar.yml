name: Publish Approved Radar

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      date:
        description: 'Radar date YYYY-MM-DD'
        required: true
      ids:
        description: 'Candidate ids e.g. 1,3'
        required: true

permissions:
  contents: write

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, 'approve'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse approve command
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "date=${{ inputs.date }}" >> $GITHUB_OUTPUT
            echo "ids=${{ inputs.ids }}" >> $GITHUB_OUTPUT
          else
            BODY="${{ github.event.comment.body }}"
            IDS=$(echo "$BODY" | grep -oiE 'approve[[:space:]]+[0-9, ]+' | head -1 | sed 's/approve//i' | tr -d ' ')
            DATE=$(echo "${{ github.event.issue.title }}" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            echo "date=$DATE" >> $GITHUB_OUTPUT
            echo "ids=$IDS" >> $GITHUB_OUTPUT
          fi

      - name: Publish to trends.json
        run: node scripts/publish-radar.mjs "${{ steps.parse.outputs.date }}" "${{ steps.parse.outputs.ids }}"

      - name: Build check
        run: npm ci && npm run build

      - name: Commit and deploy
        run: |
          git config user.name "HotPick Lab Bot"
          git config user.email "contact@hotpicklab.com"
          git add src/data/trends.json
          git commit -m "Publish radar picks ${{ steps.parse.outputs.date }} (${{ steps.parse.outputs.ids }})"
          git push
